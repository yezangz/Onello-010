<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>游戏界面设计 | Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      overflow-x: hidden;
    }

    body {
      overflow-x: hidden;
      background: #ffffff;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap-1920 {
      width: 1920px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: #ffffff;
    }

    .detail-nav {
      position: sticky;
      top: 0;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 72px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      background: #ffffff;
      z-index: 10;
    }

    .detail-back {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      color: #4a4a5a;
      text-decoration: none;
      transition: color 0.2s ease, transform 0.2s ease;
      will-change: transform;
      transform-origin: 50% 50%;
    }

    .detail-back:hover {
      color: #5b6cff;
      transform: translateX(-6px);
    }

    .detail-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
    }

    /* ===== 游戏界面设计详情页：按 Figma 244_1067 分层布局 ===== */
    .game-detail-wrap {
      position: relative;
      width: 1920px;
      height: 9720px;
      overflow: hidden;
      background: #ffffff;
    }

    .game-detail-bg {
      position: absolute;
      inset: 0;
      background-image: url('../assets/images/mrhwdp3y-o5ezc60.webp');
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .game-frame {
      position: absolute;
      display: block;
      z-index: 1;
    }

    .game-frame img {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* 7 个切片按 Figma 导出坐标定位 */
    .game-frame.frame1 { top: 0; left: 0; width: 1920px; height: 1080px; }
    .game-frame.frame2 { top: 1266px; left: 189px; width: 1543px; height: 688px; }
    .game-frame.frame3 { top: 2071px; left: 239px; width: 1443px; height: 815px; }
    .game-frame.frame4 { top: 3096px; left: 291px; width: 1391px; height: 324px; }
    .game-frame.frame5 { top: 3629px; left: 165px; width: 1590px; height: 770px; }
    .game-frame.frame6 { top: 4628px; left: 112px; width: 1697px; height: 3596px; }
    .game-frame.frame7 { top: 8502px; left: 600px; width: 719px; height: 641px; }

    .bottom-back {
      position: fixed;
      left: 50%;
      bottom: 40px;
      transform: translate(-50%, 120px);
      opacity: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      background: #1a1a2e;
      color: #ffffff;
      border-radius: 50px;
      font-size: 16px;
      text-decoration: none;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
      will-change: transform, opacity;
      transform-origin: 50% 50%;
      pointer-events: none;
    }

    .bottom-back.visible {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }

    .bottom-back:hover {
      background: #5b6cff;
    }
  </style>
</head>
<body>
  <div class="wrap-1920">
    <div class="detail-nav">
      <a class="detail-back" href="../index.html#project">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        返回作品集
      </a>
      <div class="detail-title">游戏界面设计</div>
      <div style="width:120px;"></div>
    </div>
    <div class="game-detail-wrap">
      <div class="game-detail-bg"></div>
      <div class="game-frame frame1"><img src="../assets/images/mrhwdp3y-48az3vb.webp" alt="游戏界面设计-封面" loading="lazy" decoding="async"></div>
      <div class="game-frame frame2"><img src="../assets/images/mrhwdp3y-rujq39z.webp" alt="游戏界面设计-世界观" loading="lazy" decoding="async"></div>
      <div class="game-frame frame3"><img src="../assets/images/mrhwdp3y-ckf33ju.webp" alt="游戏界面设计-情绪板" loading="lazy" decoding="async"></div>
      <div class="game-frame frame4"><img src="../assets/images/mrhwdp3y-5quuy3f.webp" alt="游戏界面设计-关键词" loading="lazy" decoding="async"></div>
      <div class="game-frame frame5"><img src="../assets/images/mrhwdp3y-ckrvah5.webp" alt="游戏界面设计-颜色与字体" loading="lazy" decoding="async"></div>
      <div class="game-frame frame6"><img src="../assets/images/mrhwdp3y-5sagafy.webp" alt="游戏界面设计-界面展示" loading="lazy" decoding="async"></div>
      <div class="game-frame frame7"><img src="../assets/images/mrhwdp3y-nrj8hfx.webp" alt="游戏界面设计-感谢观看" loading="lazy" decoding="async"></div>
    </div>
  </div>
  <a class="bottom-back" href="../index.html#project">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    返回作品集
  </a>
  <script>
    (function() {
      const backBtn = document.querySelector('.bottom-back');
      function onScroll() {
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const winHeight = window.innerHeight;
        const docHeight = document.documentElement.scrollHeight;
        const isBottom = scrollTop + winHeight >= docHeight - 20;
        backBtn.classList.toggle('visible', isBottom);
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
</html>
