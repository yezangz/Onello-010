<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>品牌设计 | Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      overflow-x: hidden;
    }

    body {
      overflow-x: hidden;
      background: #ffffff;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap-1920 {
      width: 1920px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: #ffffff;
    }

    .detail-nav {
      position: sticky;
      top: 0;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 72px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      background: #ffffff;
      z-index: 10;
    }

    .detail-back {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      color: #4a4a5a;
      text-decoration: none;
      transition: color 0.2s ease, transform 0.2s ease;
      will-change: transform;
      transform-origin: 50% 50%;
    }

    .detail-back:hover {
      color: #5b6cff;
      transform: translateX(-6px);
    }

    .detail-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .detail-content {
      padding: 0;
      display: block;
      overflow: visible;
    }

    .detail-content img {
      width: 1920px;
      height: auto;
      display: block;
    }

    .bottom-back {
      position: fixed;
      left: 50%;
      bottom: 40px;
      transform: translate(-50%, 120px);
      opacity: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      background: #1a1a2e;
      color: #ffffff;
      border-radius: 50px;
      font-size: 16px;
      text-decoration: none;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
      will-change: transform, opacity;
      transform-origin: 50% 50%;
      pointer-events: none;
    }

    .bottom-back.visible {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }

    .bottom-back:hover {
      background: #5b6cff;
    }
  </style>
</head>
<body>
  <div class="wrap-1920">
    <div class="detail-nav">
      <a class="detail-back" href="../index.html#project">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        返回作品集
      </a>
      <div class="detail-title">品牌设计</div>
      <div style="width:120px;"></div>
    </div>
    <div class="detail-content">
      <img src="../assets/images/screenshot_244_1069.png" alt="03详细页" />
    </div>
  </div>
  <a class="bottom-back" href="../index.html#project">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    返回作品集
  </a>
  <script>
    (function() {
      const backBtn = document.querySelector('.bottom-back');
      function onScroll() {
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const winHeight = window.innerHeight;
        const docHeight = document.documentElement.scrollHeight;
        const isBottom = scrollTop + winHeight >= docHeight - 20;
        backBtn.classList.toggle('visible', isBottom);
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
</html>
